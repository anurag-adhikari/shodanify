<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shodanify</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.14.8/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    .font-mono { font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace; }
    .bar-fill { transition: width 0.6s ease; }
    .tag-badge { display: inline-flex; align-items: center; gap: 2px; padding: 1px 6px; border-radius: 9999px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .glow-orange { box-shadow: 0 0 20px rgba(249,115,22,0.15); }
    .row-hover:hover { background-color: rgba(30,41,59,0.8) !important; cursor: pointer; }
    .modal-enter { animation: modalIn 0.18s ease-out; }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.97) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  </style>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { shodan: '#f97316' } } }
    }
  </script>
</head>

<body class="bg-slate-950 text-slate-200 min-h-screen font-mono antialiased">

<div x-data="shodanify()" x-init="init()" x-cloak>

  <!-- ═══ HEADER ═══════════════════════════════════════════════════════════ -->
  <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-40">
    <div class="max-w-screen-2xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-orange-500/20 border border-orange-500/40 flex items-center justify-center glow-orange">
          <svg class="w-4 h-4 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
          </svg>
        </div>
        <span class="text-lg font-bold tracking-tight text-slate-100">Shodanify</span>
        <span class="text-slate-600 text-sm">—</span>
        <span class="text-slate-400 text-sm">Shodan Export Viewer</span>
      </div>
      <div class="flex items-center gap-3">
        <template x-if="stats">
          <span class="text-slate-500 text-xs">
            <span class="text-slate-300" x-text="stats.total_records"></span> records ·
            <span class="text-slate-300" x-text="stats.unique_ips"></span> IPs
          </span>
        </template>
        <button @click="reload()"
          :disabled="loading"
          class="flex items-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-semibold bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 transition disabled:opacity-50">
          <svg class="w-3.5 h-3.5" :class="loading ? 'animate-spin' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
          Reload
        </button>
      </div>
    </div>
  </header>

  <!-- Loading state -->
  <div x-show="loading" class="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur flex items-center justify-center">
    <div class="flex flex-col items-center gap-3">
      <svg class="w-8 h-8 text-orange-500 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
      <span class="text-slate-400 text-sm">Loading Shodan data…</span>
    </div>
  </div>

  <div class="max-w-screen-2xl mx-auto px-4 py-6">

    <!-- ═══ STAT CARDS ═══════════════════════════════════════════════════ -->
    <template x-if="stats">
      <div class="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-8 gap-3 mb-6">
        <!-- Total Records -->
        <div class="col-span-2 bg-slate-900 border border-slate-800 rounded-xl p-4 flex items-start gap-3">
          <div class="p-2 rounded-lg bg-orange-500/10 border border-orange-500/20 mt-0.5 flex-shrink-0">
            <svg class="w-4 h-4 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2"/>
            </svg>
          </div>
          <div>
            <div class="text-2xl font-bold text-slate-100" x-text="stats.total_records"></div>
            <div class="text-xs text-slate-500 uppercase tracking-wider mt-0.5">Total Records</div>
            <div class="text-xs text-slate-400 mt-1" x-text="`${stats.unique_ips} unique IPs · ${stats.unique_ports} ports`"></div>
          </div>
        </div>
        <!-- Countries -->
        <div class="col-span-2 bg-slate-900 border border-slate-800 rounded-xl p-4 flex items-start gap-3">
          <div class="p-2 rounded-lg bg-blue-500/10 border border-blue-500/20 mt-0.5 flex-shrink-0">
            <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
          <div>
            <div class="text-2xl font-bold text-slate-100" x-text="stats.unique_countries"></div>
            <div class="text-xs text-slate-500 uppercase tracking-wider mt-0.5">Countries</div>
            <div class="text-xs text-slate-400 mt-1" x-text="stats.top_countries.slice(0,2).map(c => c.name).join(', ')"></div>
          </div>
        </div>
        <!-- CVEs -->
        <div class="col-span-2 bg-slate-900 border border-slate-800 rounded-xl p-4 flex items-start gap-3">
          <div class="p-2 rounded-lg bg-red-500/10 border border-red-500/20 mt-0.5 flex-shrink-0">
            <svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
          </div>
          <div>
            <div class="text-2xl font-bold text-slate-100" x-text="stats.unique_cves"></div>
            <div class="text-xs text-slate-500 uppercase tracking-wider mt-0.5">Unique CVEs</div>
            <div class="text-xs text-slate-400 mt-1">
              <span class="text-red-400" x-text="stats.severity.critical"></span> crit ·
              <span class="text-orange-400" x-text="stats.severity.high"></span> high ·
              <span class="text-yellow-400" x-text="stats.severity.medium"></span> med
            </div>
          </div>
        </div>
        <!-- Severity breakdown -->
        <div class="col-span-2 bg-slate-900 border border-slate-800 rounded-xl p-4">
          <div class="text-xs text-slate-500 uppercase tracking-wider mb-2">Severity Breakdown</div>
          <div class="space-y-1.5">
            <template x-for="[label, color, key] in [['Critical','bg-red-500','critical'],['High','bg-orange-500','high'],['Medium','bg-yellow-500','medium'],['Low','bg-blue-500','low']]">
              <div class="flex items-center gap-2">
                <span class="w-14 text-xs text-slate-400 text-right" x-text="label"></span>
                <div class="flex-1 bg-slate-800 rounded-full h-1.5 overflow-hidden">
                  <div class="h-full rounded-full bar-fill" :class="color"
                    :style="`width:${stats.total_vuln_instances ? (stats.severity[key]/stats.total_vuln_instances*100) : 0}%`"></div>
                </div>
                <span class="w-8 text-xs text-slate-500 text-right" x-text="stats.severity[key]"></span>
              </div>
            </template>
          </div>
        </div>
      </div>
    </template>

    <!-- ═══ TAB NAV ══════════════════════════════════════════════════════ -->
    <div class="flex items-center gap-1 mb-6 border-b border-slate-800 pb-0">
      <template x-for="tab in ['overview','hosts','vulnerabilities','technologies']">
        <button @click="view = tab"
          class="px-4 py-2.5 text-sm font-semibold capitalize transition border-b-2 -mb-px"
          :class="view === tab
            ? 'border-orange-500 text-orange-400'
            : 'border-transparent text-slate-500 hover:text-slate-300 hover:border-slate-600'"
          x-text="tab"></button>
      </template>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!--  OVERVIEW TAB                                                       -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <div x-show="view === 'overview' && stats">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">

        <!-- Top Ports -->
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
          <h3 class="text-xs text-slate-500 uppercase tracking-wider font-semibold mb-4">Top Ports / Services</h3>
          <div class="space-y-2.5">
            <template x-for="(item, i) in stats.top_ports" :key="item.port">
              <div class="flex items-center gap-3">
                <span class="w-14 text-right text-xs font-bold"
                  :class="item.port===443?'text-purple-400':item.port===80?'text-blue-400':item.port===22?'text-green-400':'text-slate-400'"
                  x-text="':'+item.port"></span>
                <div class="flex-1 bg-slate-800 rounded-full h-2 overflow-hidden">
                  <div class="h-full rounded-full bar-fill"
                    :class="item.port===443?'bg-purple-500':item.port===80?'bg-blue-500':item.port===22?'bg-green-500':'bg-orange-500'"
                    :style="`width:${stats.top_ports[0]?.count ? (item.count/stats.top_ports[0].count*100) : 0}%`"></div>
                </div>
                <span class="w-8 text-xs text-slate-400 text-right" x-text="item.count"></span>
              </div>
            </template>
          </div>
        </div>

        <!-- Top Countries -->
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
          <h3 class="text-xs text-slate-500 uppercase tracking-wider font-semibold mb-4">Top Countries</h3>
          <div class="space-y-2.5">
            <template x-for="(c, i) in stats.top_countries.slice(0,10)" :key="c.code">
              <div class="flex items-center gap-3">
                <span class="w-6 text-sm" x-text="flag(c.code)"></span>
                <span class="flex-1 text-xs text-slate-300 truncate" x-text="c.name"></span>
                <div class="w-20 bg-slate-800 rounded-full h-2 overflow-hidden">
                  <div class="h-full bg-blue-500 rounded-full bar-fill"
                    :style="`width:${stats.top_countries[0]?.count ? (c.count/stats.top_countries[0].count*100) : 0}%`"></div>
                </div>
                <span class="w-6 text-xs text-slate-400 text-right" x-text="c.count"></span>
              </div>
            </template>
          </div>
        </div>

        <!-- Top Orgs -->
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
          <h3 class="text-xs text-slate-500 uppercase tracking-wider font-semibold mb-4">Top Organizations</h3>
          <div class="space-y-2.5">
            <template x-for="o in stats.top_orgs" :key="o.org">
              <div class="flex items-center gap-3">
                <span class="flex-1 text-xs text-slate-300 truncate" x-text="o.org"></span>
                <div class="w-20 bg-slate-800 rounded-full h-2 overflow-hidden">
                  <div class="h-full bg-orange-500 rounded-full bar-fill"
                    :style="`width:${stats.top_orgs[0]?.count ? (o.count/stats.top_orgs[0].count*100) : 0}%`"></div>
                </div>
                <span class="w-6 text-xs text-slate-400 text-right" x-text="o.count"></span>
              </div>
            </template>
          </div>
        </div>

        <!-- Top Vulnerabilities -->
        <div class="lg:col-span-2 bg-slate-900 border border-slate-800 rounded-xl p-5">
          <h3 class="text-xs text-slate-500 uppercase tracking-wider font-semibold mb-4">Top Vulnerabilities by CVSS</h3>
          <div class="space-y-2">
            <template x-for="v in stats.top_vulns.slice(0,8)" :key="v.cve">
              <div class="flex items-start gap-3 p-2.5 rounded-lg bg-slate-800/50 hover:bg-slate-800 transition cursor-pointer"
                @click="view='vulnerabilities'">
                <span class="tag-badge flex-shrink-0 mt-0.5" :class="severityBg(v.max_cvss)" x-text="severityLabel(v.max_cvss)"></span>
                <div class="min-w-0 flex-1">
                  <div class="flex items-center gap-2">
                    <span class="text-xs font-bold text-slate-200" x-text="v.cve"></span>
                    <span class="text-xs font-bold" :class="severityColor(v.max_cvss)" x-text="v.max_cvss.toFixed(1)"></span>
                    <template x-if="v.verified">
                      <span class="tag-badge bg-green-950 text-green-400 border border-green-800">Verified</span>
                    </template>
                    <span class="tag-badge bg-slate-700 text-slate-400 border border-slate-600"
                      x-text="v.host_count + (v.host_count===1?' host':' hosts')"></span>
                  </div>
                  <p class="text-xs text-slate-500 mt-0.5 truncate" x-text="v.summary"></p>
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- Technology Breakdown -->
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
          <h3 class="text-xs text-slate-500 uppercase tracking-wider font-semibold mb-4">Technology Stack</h3>
          <div class="flex flex-wrap gap-1.5">
            <template x-for="t in stats.tech" :key="t.name">
              <div class="flex items-center gap-1.5 px-2.5 py-1 bg-slate-800 rounded-full border border-slate-700 hover:border-slate-500 transition">
                <span class="text-xs font-semibold text-slate-200" x-text="t.name"></span>
                <span class="text-xs text-slate-500 bg-slate-700 rounded-full px-1.5 py-0.5 leading-none" x-text="t.count"></span>
              </div>
            </template>
          </div>
        </div>

      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!--  HOSTS TAB                                                          -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <div x-show="view === 'hosts'">
      <!-- Filter bar -->
      <div class="flex flex-wrap gap-3 mb-4">
        <div class="relative flex-1 min-w-60">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input type="text" x-model="search" placeholder="Search IP, hostname, org, title, tech…"
            class="w-full bg-slate-900 border border-slate-700 rounded-lg pl-9 pr-4 py-2 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500/30">
        </div>
        <select x-model="filters.port"
          class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-300 focus:outline-none focus:border-orange-500">
          <option value="">All Ports</option>
          <template x-if="stats">
            <template x-for="p in stats.top_ports" :key="p.port">
              <option :value="p.port" x-text="':'+p.port+' ('+p.count+')'"></option>
            </template>
          </template>
        </select>
        <label class="flex items-center gap-2 px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg cursor-pointer text-sm text-slate-300">
          <input type="checkbox" x-model="filters.hasCVE" class="accent-orange-500 rounded">
          Has CVEs
        </label>
        <label class="flex items-center gap-2 px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg cursor-pointer text-sm text-slate-300">
          <input type="checkbox" x-model="filters.hasSSL" class="accent-orange-500 rounded">
          Has SSL
        </label>
        <button @click="filters={port:'',country:'',hasCVE:false,hasSSL:false}; search=''"
          class="px-3 py-2 text-xs text-slate-400 hover:text-slate-200 bg-slate-900 border border-slate-700 rounded-lg transition">
          Clear
        </button>
        <span class="flex items-center px-3 py-2 text-xs text-slate-500">
          <span class="text-slate-300 font-semibold mr-1" x-text="filteredRecords.length"></span> results
        </span>
      </div>

      <!-- Table -->
      <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-xs">
            <thead>
              <tr class="border-b border-slate-800 text-slate-500 uppercase tracking-wider text-[10px]">
                <th class="text-left px-4 py-3 cursor-pointer hover:text-slate-300 select-none" @click="toggleSort('ip_str')">
                  IP <span x-show="sort.by==='ip_str'" x-text="sort.dir==='asc'?'↑':'↓'"></span>
                </th>
                <th class="text-left px-3 py-3 cursor-pointer hover:text-slate-300 select-none" @click="toggleSort('port')">
                  Port <span x-show="sort.by==='port'" x-text="sort.dir==='asc'?'↑':'↓'"></span>
                </th>
                <th class="text-left px-3 py-3 cursor-pointer hover:text-slate-300 select-none" @click="toggleSort('org')">
                  Org / ISP <span x-show="sort.by==='org'" x-text="sort.dir==='asc'?'↑':'↓'"></span>
                </th>
                <th class="text-left px-3 py-3 cursor-pointer hover:text-slate-300 select-none" @click="toggleSort('country_name')">
                  Location <span x-show="sort.by==='country_name'" x-text="sort.dir==='asc'?'↑':'↓'"></span>
                </th>
                <th class="text-left px-3 py-3">Hostname / Title</th>
                <th class="text-left px-3 py-3">Tech</th>
                <th class="text-center px-3 py-3 cursor-pointer hover:text-slate-300 select-none" @click="toggleSort('max_cvss')">
                  CVEs <span x-show="sort.by==='max_cvss'" x-text="sort.dir==='asc'?'↑':'↓'"></span>
                </th>
                <th class="text-left px-3 py-3 cursor-pointer hover:text-slate-300 select-none" @click="toggleSort('timestamp')">
                  Scanned <span x-show="sort.by==='timestamp'" x-text="sort.dir==='asc'?'↑':'↓'"></span>
                </th>
              </tr>
            </thead>
            <tbody>
              <template x-for="r in filteredRecords" :key="r.ip_str+':'+r.port">
                <tr class="border-b border-slate-800/50 row-hover transition" @click="openHost(r)">
                  <!-- IP -->
                  <td class="px-4 py-3 font-mono font-semibold text-orange-400" x-text="r.ip_str"></td>
                  <!-- Port -->
                  <td class="px-3 py-3">
                    <span class="inline-flex items-center gap-1">
                      <span class="font-semibold"
                        :class="r.port===443?'text-purple-400':r.port===80?'text-blue-400':r.port===22?'text-green-400':'text-slate-300'"
                        x-text="r.port"></span>
                      <span class="text-slate-600" x-text="r.transport || 'tcp'"></span>
                      <template x-if="r.has_ssl">
                        <svg class="w-3 h-3 text-purple-400" fill="currentColor" viewBox="0 0 20 20">
                          <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
                        </svg>
                      </template>
                    </span>
                  </td>
                  <!-- Org -->
                  <td class="px-3 py-3 text-slate-400 max-w-[160px]">
                    <span class="truncate block" x-text="r.org || r.isp || '—'"></span>
                    <template x-if="r.asn">
                      <span class="text-slate-600 text-[10px]" x-text="r.asn"></span>
                    </template>
                  </td>
                  <!-- Location -->
                  <td class="px-3 py-3 text-slate-400 whitespace-nowrap">
                    <span x-text="flag(r.country_code)"></span>
                    <span class="ml-1" x-text="r.city ? r.city+', '+r.country_code : (r.country_name || '—')"></span>
                  </td>
                  <!-- Hostname / Title -->
                  <td class="px-3 py-3 max-w-[200px]">
                    <template x-if="r.http_title">
                      <span class="text-slate-300 truncate block" x-text="r.http_title"></span>
                    </template>
                    <template x-if="r.hostname">
                      <span class="text-slate-500 text-[10px] truncate block" x-text="r.hostname"></span>
                    </template>
                    <template x-if="!r.http_title && !r.hostname">
                      <span class="text-slate-600">—</span>
                    </template>
                  </td>
                  <!-- Tech -->
                  <td class="px-3 py-3">
                    <div class="flex flex-wrap gap-1">
                      <template x-for="t in r.tech.slice(0,3)" :key="t">
                        <span class="inline-block px-1.5 py-0.5 bg-slate-800 border border-slate-700 rounded text-slate-400 text-[10px]" x-text="t"></span>
                      </template>
                      <template x-if="r.tech.length > 3">
                        <span class="inline-block px-1.5 py-0.5 bg-slate-800 border border-slate-700 rounded text-slate-500 text-[10px]" x-text="'+' + (r.tech.length-3)"></span>
                      </template>
                    </div>
                    <template x-if="r.cloud">
                      <span class="tag-badge bg-sky-950 text-sky-400 border border-sky-800 mt-1" x-text="r.cloud.provider || 'Cloud'"></span>
                    </template>
                  </td>
                  <!-- CVEs -->
                  <td class="px-3 py-3 text-center">
                    <template x-if="r.vulns_count > 0">
                      <div class="flex flex-col items-center gap-0.5">
                        <span class="font-bold" :class="severityColor(r.max_cvss)" x-text="r.vulns_count"></span>
                        <span class="text-[10px]" :class="severityColor(r.max_cvss)"
                          x-text="'CVSS '+r.max_cvss.toFixed(1)"></span>
                      </div>
                    </template>
                    <template x-if="r.vulns_count === 0">
                      <span class="text-slate-700">—</span>
                    </template>
                  </td>
                  <!-- Timestamp -->
                  <td class="px-3 py-3 text-slate-500 whitespace-nowrap" x-text="formatDateShort(r.timestamp)"></td>
                </tr>
              </template>
              <template x-if="filteredRecords.length === 0">
                <tr>
                  <td colspan="8" class="text-center py-12 text-slate-500">No records match your filters.</td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!--  VULNERABILITIES TAB                                                -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <div x-show="view === 'vulnerabilities' && stats">
      <div class="flex gap-3 mb-4 flex-wrap items-center">
        <div class="relative flex-1 min-w-60">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input type="text" x-model="vulnSearch" placeholder="Search CVE ID or description…"
            class="w-full bg-slate-900 border border-slate-700 rounded-lg pl-9 pr-4 py-2 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500/30">
        </div>
        <select x-model="vulnFilter"
          class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-300 focus:outline-none focus:border-orange-500">
          <option value="">All Severities</option>
          <option value="critical">Critical (≥9.0)</option>
          <option value="high">High (≥7.0)</option>
          <option value="medium">Medium (≥4.0)</option>
          <option value="low">Low</option>
        </select>
        <label class="flex items-center gap-2 px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg cursor-pointer text-sm text-slate-300">
          <input type="checkbox" x-model="vulnVerifiedOnly" class="accent-green-500 rounded">
          Verified Only
        </label>
      </div>

      <div class="space-y-2">
        <template x-for="v in filteredVulns" :key="v.cve">
          <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
            <div class="p-4 flex items-start gap-4 cursor-pointer" @click="v._open = !v._open">
              <span class="tag-badge flex-shrink-0 mt-0.5" :class="severityBg(v.max_cvss)" x-text="severityLabel(v.max_cvss)"></span>
              <div class="flex-1 min-w-0">
                <div class="flex items-center flex-wrap gap-2 mb-1">
                  <span class="font-bold text-slate-100 text-sm" x-text="v.cve"></span>
                  <span class="font-bold text-sm" :class="severityColor(v.max_cvss)" x-text="'CVSS '+v.max_cvss.toFixed(1)"></span>
                  <template x-if="v.verified">
                    <span class="tag-badge bg-green-950 text-green-400 border border-green-800">✓ Verified</span>
                  </template>
                  <template x-if="v.epss">
                    <span class="tag-badge bg-slate-800 text-slate-400 border border-slate-700"
                      x-text="'EPSS ' + (v.epss*100).toFixed(2)+'%'"></span>
                  </template>
                  <span class="tag-badge bg-slate-800 text-slate-400 border border-slate-700"
                    x-text="v.host_count + (v.host_count===1?' host':' hosts')"></span>
                </div>
                <p class="text-xs text-slate-400 line-clamp-2" x-text="v.summary || 'No description available.'"></p>
              </div>
              <svg class="w-4 h-4 text-slate-500 flex-shrink-0 mt-1 transition-transform" :class="v._open ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </div>
            <div x-show="v._open" x-collapse class="border-t border-slate-800 px-4 py-3 space-y-3 bg-slate-950/50">
              <div>
                <div class="text-[10px] uppercase text-slate-500 font-semibold mb-1">Full Description</div>
                <p class="text-xs text-slate-300 leading-relaxed" x-text="v.summary"></p>
              </div>
              <div>
                <div class="text-[10px] uppercase text-slate-500 font-semibold mb-1">Affected Hosts</div>
                <div class="flex flex-wrap gap-1.5">
                  <template x-for="h in v.hosts" :key="h.ip+':'+h.port">
                    <button @click.stop="openHostByIp(h.ip, h.port)"
                      class="flex flex-col items-start px-2.5 py-1.5 bg-slate-800 border border-slate-700 rounded-lg hover:border-orange-500 transition text-left">
                      <span class="text-[11px] text-orange-400 font-mono leading-tight" x-text="h.ip+':'+h.port"></span>
                      <template x-if="h.hostname">
                        <span class="text-[10px] text-slate-500 font-mono leading-tight truncate max-w-[200px]" x-text="h.hostname"></span>
                      </template>
                    </button>
                  </template>
                </div>
              </div>
            </div>
          </div>
        </template>
        <template x-if="filteredVulns.length === 0">
          <div class="text-center py-12 text-slate-500">No vulnerabilities match your filters.</div>
        </template>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!--  TECHNOLOGIES TAB                                                   -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <div x-show="view === 'technologies' && stats">
      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3">
        <template x-for="t in stats.tech" :key="t.name">
          <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 hover:border-slate-600 transition">
            <div class="text-sm font-bold text-slate-200 truncate" x-text="t.name"></div>
            <div class="mt-1 flex flex-wrap gap-1">
              <template x-for="cat in t.categories" :key="cat">
                <span class="tag-badge bg-slate-800 text-slate-400 border border-slate-700" x-text="cat"></span>
              </template>
            </div>
            <template x-if="t.versions && t.versions.length">
              <div class="mt-2 flex flex-wrap gap-1">
                <template x-for="ver in t.versions.slice(0,3)" :key="ver">
                  <span class="tag-badge bg-blue-950 text-blue-400 border border-blue-800" x-text="ver"></span>
                </template>
              </div>
            </template>
            <div class="mt-3 flex items-center gap-1.5">
              <span class="text-2xl font-black text-slate-600" x-text="t.count"></span>
              <span class="text-xs text-slate-500" x-text="t.count===1?'host':'hosts'"></span>
            </div>
          </div>
        </template>
        <template x-if="!stats.tech.length">
          <div class="col-span-full text-center py-12 text-slate-500">No technology data found in records.</div>
        </template>
      </div>
    </div>

  </div><!-- /max-w container -->

  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!--  HOST DETAIL MODAL                                                      -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <div x-show="selectedRecord" x-cloak
    class="fixed inset-0 z-50 flex items-start justify-center pt-8 pb-8 px-4 overflow-y-auto bg-slate-950/90 backdrop-blur"
    @click.self="closeModal()">
    <div class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-3xl shadow-2xl modal-enter" @click.stop>

      <!-- Modal Header -->
      <div class="flex items-start justify-between p-5 border-b border-slate-800">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-3 flex-wrap">
            <span class="text-xl font-black text-orange-400 font-mono" x-text="selectedRecord?.ip_str"></span>
            <span class="text-slate-500">:</span>
            <span class="text-xl font-black font-mono"
              :class="selectedRecord?.port===443?'text-purple-400':selectedRecord?.port===80?'text-blue-400':'text-slate-200'"
              x-text="selectedRecord?.port"></span>
            <span class="tag-badge bg-slate-800 text-slate-400 border border-slate-700" x-text="selectedRecord?.transport || 'tcp'"></span>
            <template x-if="selectedRecord?.has_ssl">
              <span class="tag-badge bg-purple-950 text-purple-400 border border-purple-800">TLS/SSL</span>
            </template>
            <template x-if="selectedRecord?.cloud">
              <span class="tag-badge bg-sky-950 text-sky-400 border border-sky-800" x-text="selectedRecord.cloud.provider"></span>
            </template>
            <template x-for="tag in (selectedRecord?.tags || [])">
              <span class="tag-badge"
                :class="tag==='cloud'?'bg-sky-950 text-sky-400 border-sky-800':tag.includes('eol')?'bg-red-950 text-red-400 border-red-800':'bg-slate-800 text-slate-400 border-slate-700'"
                x-text="tag"></span>
            </template>
          </div>
          <div class="flex items-center gap-2 mt-1.5 text-xs text-slate-500">
            <span x-text="flag(selectedRecord?.country_code)"></span>
            <span x-text="[selectedRecord?.city, selectedRecord?.country_name].filter(Boolean).join(', ') || selectedRecord?.country_name || '—'"></span>
            <span class="text-slate-700">·</span>
            <span x-text="selectedRecord?.org || selectedRecord?.isp || '—'"></span>
            <span class="text-slate-700">·</span>
            <span x-text="formatDate(selectedRecord?.timestamp)"></span>
          </div>
        </div>
        <button @click="closeModal()" class="ml-3 p-1.5 rounded-lg text-slate-500 hover:text-slate-200 hover:bg-slate-800 transition flex-shrink-0">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Quick stats row -->
      <template x-if="selectedRecord">
        <div class="grid grid-cols-4 divide-x divide-slate-800 border-b border-slate-800">
          <div class="px-4 py-2.5 text-center">
            <div class="text-xs text-slate-500 uppercase tracking-wider">CVEs</div>
            <div class="font-bold mt-0.5"
              :class="selectedRecord.vulns_count>0 ? severityColor(selectedRecord.max_cvss) : 'text-slate-600'"
              x-text="selectedRecord.vulns_count || '—'"></div>
          </div>
          <div class="px-4 py-2.5 text-center">
            <div class="text-xs text-slate-500 uppercase tracking-wider">Max CVSS</div>
            <div class="font-bold mt-0.5"
              :class="selectedRecord.max_cvss>0 ? severityColor(selectedRecord.max_cvss) : 'text-slate-600'"
              x-text="selectedRecord.max_cvss>0 ? selectedRecord.max_cvss.toFixed(1) : '—'"></div>
          </div>
          <div class="px-4 py-2.5 text-center">
            <div class="text-xs text-slate-500 uppercase tracking-wider">HTTP</div>
            <div class="font-bold mt-0.5"
              :class="selectedRecord.http_status===200?'text-green-400':selectedRecord.http_status>=300&&selectedRecord.http_status<400?'text-blue-400':selectedRecord.http_status>=400?'text-red-400':'text-slate-600'"
              x-text="selectedRecord.http_status || '—'"></div>
          </div>
          <div class="px-4 py-2.5 text-center">
            <div class="text-xs text-slate-500 uppercase tracking-wider">Tech</div>
            <div class="font-bold text-slate-300 mt-0.5" x-text="selectedRecord.tech?.length || '—'"></div>
          </div>
        </div>
      </template>

      <!-- Modal Tabs -->
      <div class="flex border-b border-slate-800 px-5 pt-1">
        <template x-for="tab in ['info','http','ssl','vulns','raw']" :key="tab">
          <button @click="modalTab = tab"
            class="px-3 py-2 text-xs font-semibold uppercase tracking-wider capitalize transition border-b-2 -mb-px"
            :class="modalTab === tab
              ? 'border-orange-500 text-orange-400'
              : 'border-transparent text-slate-500 hover:text-slate-300'"
            x-text="tab"></button>
        </template>
      </div>

      <!-- Modal loading -->
      <div x-show="modalLoading" class="p-12 flex items-center justify-center">
        <svg class="w-6 h-6 text-orange-500 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
      </div>

      <template x-if="recordDetail && !modalLoading">
        <div class="p-5 space-y-4 max-h-[60vh] overflow-y-auto">

          <!-- INFO TAB -->
          <div x-show="modalTab === 'info'" class="space-y-4">
            <div class="grid grid-cols-2 gap-3">
              <template x-for="[label, value] in [
                ['IP Address', recordDetail.ip_str],
                ['Port', recordDetail.port + ' / ' + (recordDetail.transport||'tcp')],
                ['Organization', recordDetail.org || '—'],
                ['ISP', recordDetail.isp || '—'],
                ['ASN', recordDetail.asn || '—'],
                ['OS', recordDetail.os || '—'],
                ['Product', recordDetail.product || '—'],
                ['Version', recordDetail.version || '—'],
              ]">
                <div class="bg-slate-800/50 rounded-lg p-3">
                  <div class="text-[10px] text-slate-500 uppercase tracking-wider mb-1" x-text="label"></div>
                  <div class="text-sm text-slate-200 font-mono break-all" x-text="value"></div>
                </div>
              </template>
            </div>
            <div class="bg-slate-800/50 rounded-lg p-3">
              <div class="text-[10px] text-slate-500 uppercase tracking-wider mb-2">Location</div>
              <div class="flex items-center gap-2 text-sm">
                <span x-text="flag(recordDetail.location?.country_code)" class="text-base"></span>
                <span class="text-slate-200" x-text="[recordDetail.location?.city, recordDetail.location?.region, recordDetail.location?.country_name].filter(Boolean).join(', ')"></span>
              </div>
              <template x-if="recordDetail.location?.lat">
                <div class="text-xs text-slate-500 mt-1"
                  x-text="`${recordDetail.location.lat?.toFixed(4)}, ${recordDetail.location.lon?.toFixed(4)}`"></div>
              </template>
            </div>
            <template x-if="recordDetail.cloud">
              <div class="bg-sky-950/40 border border-sky-800/50 rounded-lg p-3">
                <div class="text-[10px] text-sky-500 uppercase tracking-wider mb-2">Cloud Provider</div>
                <div class="flex items-center gap-3 text-sm">
                  <span class="font-bold text-sky-300" x-text="recordDetail.cloud.provider"></span>
                  <span class="text-sky-500" x-text="recordDetail.cloud.service"></span>
                  <span class="text-sky-600" x-text="recordDetail.cloud.region"></span>
                </div>
              </div>
            </template>
            <template x-if="recordDetail.hostnames?.length">
              <div class="bg-slate-800/50 rounded-lg p-3">
                <div class="text-[10px] text-slate-500 uppercase tracking-wider mb-2">Hostnames</div>
                <div class="flex flex-wrap gap-1.5">
                  <template x-for="h in recordDetail.hostnames" :key="h">
                    <span class="px-2 py-0.5 bg-slate-700 rounded text-xs text-slate-300 font-mono" x-text="h"></span>
                  </template>
                </div>
              </div>
            </template>
            <template x-if="recordDetail.domains?.length">
              <div class="bg-slate-800/50 rounded-lg p-3">
                <div class="text-[10px] text-slate-500 uppercase tracking-wider mb-2">Domains</div>
                <div class="flex flex-wrap gap-1.5">
                  <template x-for="d in recordDetail.domains" :key="d">
                    <span class="px-2 py-0.5 bg-slate-700 rounded text-xs text-slate-300 font-mono" x-text="d"></span>
                  </template>
                </div>
              </div>
            </template>
            <template x-if="recordDetail.cpe?.length">
              <div class="bg-slate-800/50 rounded-lg p-3">
                <div class="text-[10px] text-slate-500 uppercase tracking-wider mb-2">CPE Identifiers</div>
                <div class="space-y-0.5">
                  <template x-for="c in recordDetail.cpe" :key="c">
                    <div class="text-xs text-slate-400 font-mono" x-text="c"></div>
                  </template>
                </div>
              </div>
            </template>
          </div>

          <!-- HTTP TAB -->
          <div x-show="modalTab === 'http'" class="space-y-3">
            <template x-if="recordDetail.http">
              <div>
                <div class="grid grid-cols-2 gap-3 mb-3">
                  <div class="bg-slate-800/50 rounded-lg p-3">
                    <div class="text-[10px] text-slate-500 uppercase tracking-wider mb-1">Status</div>
                    <div class="text-2xl font-black font-mono"
                      :class="recordDetail.http.status===200?'text-green-400':recordDetail.http.status>=300&&recordDetail.http.status<400?'text-blue-400':recordDetail.http.status>=400?'text-red-400':'text-slate-400'"
                      x-text="recordDetail.http.status || '—'"></div>
                  </div>
                  <div class="bg-slate-800/50 rounded-lg p-3">
                    <div class="text-[10px] text-slate-500 uppercase tracking-wider mb-1">Server</div>
                    <div class="text-sm text-slate-200 font-mono" x-text="recordDetail.http.server || '—'"></div>
                  </div>
                </div>
                <template x-if="recordDetail.http.title">
                  <div class="bg-slate-800/50 rounded-lg p-3 mb-3">
                    <div class="text-[10px] text-slate-500 uppercase tracking-wider mb-1">Page Title</div>
                    <div class="text-sm text-slate-200" x-text="recordDetail.http.title"></div>
                  </div>
                </template>
                <template x-if="recordDetail.http.host">
                  <div class="bg-slate-800/50 rounded-lg p-3 mb-3">
                    <div class="text-[10px] text-slate-500 uppercase tracking-wider mb-1">Host Header</div>
                    <div class="text-sm text-slate-200 font-mono" x-text="recordDetail.http.host"></div>
                  </div>
                </template>
                <template x-if="recordDetail.http.components?.length">
                  <div class="bg-slate-800/50 rounded-lg p-3 mb-3">
                    <div class="text-[10px] text-slate-500 uppercase tracking-wider mb-3">Detected Technologies</div>
                    <div class="space-y-2">
                      <template x-for="t in recordDetail.http.components" :key="t.name">
                        <div class="flex items-center gap-3">
                          <span class="text-sm font-semibold text-slate-200 w-28 flex-shrink-0" x-text="t.name"></span>
                          <div class="flex flex-wrap gap-1">
                            <template x-for="cat in t.categories" :key="cat">
                              <span class="tag-badge bg-slate-700 text-slate-400 border border-slate-600" x-text="cat"></span>
                            </template>
                            <template x-for="ver in t.versions" :key="ver">
                              <span class="tag-badge bg-blue-950 text-blue-400 border border-blue-800" x-text="ver"></span>
                            </template>
                          </div>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>
                <template x-if="recordDetail.http.robots">
                  <div class="bg-slate-800/50 rounded-lg p-3">
                    <div class="text-[10px] text-slate-500 uppercase tracking-wider mb-2">robots.txt</div>
                    <pre class="text-xs text-slate-400 overflow-x-auto whitespace-pre-wrap" x-text="recordDetail.http.robots"></pre>
                  </div>
                </template>
              </div>
            </template>
            <template x-if="!recordDetail.http">
              <div class="text-center py-10 text-slate-500">No HTTP data available.</div>
            </template>
          </div>

          <!-- SSL TAB -->
          <div x-show="modalTab === 'ssl'" class="space-y-3">
            <template x-if="recordDetail.ssl">
              <div class="space-y-3">
                <!-- Cert status banner -->
                <div class="rounded-lg p-3 border"
                  :class="recordDetail.ssl.expired ? 'bg-red-950/40 border-red-800 text-red-400' : 'bg-green-950/40 border-green-800 text-green-400'">
                  <div class="flex items-center gap-2 font-semibold text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        :d="recordDetail.ssl.expired ? 'M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z' : 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z'"/>
                    </svg>
                    <span x-text="recordDetail.ssl.expired ? 'Certificate EXPIRED' : 'Certificate Valid'"></span>
                  </div>
                </div>
                <!-- Subject & Issuer -->
                <div class="grid grid-cols-2 gap-3">
                  <div class="bg-slate-800/50 rounded-lg p-3">
                    <div class="text-[10px] text-slate-500 uppercase tracking-wider mb-2">Subject</div>
                    <template x-for="[k,v] in Object.entries(recordDetail.ssl.subject || {})" :key="k">
                      <div class="flex gap-2 text-xs">
                        <span class="text-slate-500 w-6" x-text="k"></span>
                        <span class="text-slate-200 font-mono truncate" x-text="v"></span>
                      </div>
                    </template>
                  </div>
                  <div class="bg-slate-800/50 rounded-lg p-3">
                    <div class="text-[10px] text-slate-500 uppercase tracking-wider mb-2">Issuer</div>
                    <template x-for="[k,v] in Object.entries(recordDetail.ssl.issuer || {})" :key="k">
                      <div class="flex gap-2 text-xs">
                        <span class="text-slate-500 w-6" x-text="k"></span>
                        <span class="text-slate-200 font-mono truncate" x-text="v"></span>
                      </div>
                    </template>
                  </div>
                </div>
                <!-- Validity & Fingerprint -->
                <div class="grid grid-cols-2 gap-3">
                  <div class="bg-slate-800/50 rounded-lg p-3">
                    <div class="text-[10px] text-slate-500 uppercase tracking-wider mb-2">Validity Period</div>
                    <div class="space-y-1.5">
                      <div class="flex gap-2 text-xs">
                        <span class="text-slate-500">Issued</span>
                        <span class="text-slate-200 font-mono" x-text="recordDetail.ssl.issued ? new Date(recordDetail.ssl.issued).toLocaleDateString() : '—'"></span>
                      </div>
                      <div class="flex gap-2 text-xs">
                        <span class="text-slate-500">Expires</span>
                        <span class="font-mono"
                          :class="recordDetail.ssl.expired ? 'text-red-400' : 'text-green-400'"
                          x-text="recordDetail.ssl.expires ? new Date(recordDetail.ssl.expires).toLocaleDateString() : '—'"></span>
                      </div>
                      <div class="flex gap-2 text-xs">
                        <span class="text-slate-500">Sig Alg</span>
                        <span class="text-slate-300 font-mono" x-text="recordDetail.ssl.sig_alg || '—'"></span>
                      </div>
                    </div>
                  </div>
                  <div class="bg-slate-800/50 rounded-lg p-3">
                    <div class="text-[10px] text-slate-500 uppercase tracking-wider mb-2">Cipher Suite</div>
                    <template x-if="recordDetail.ssl.cipher">
                      <div class="space-y-1.5">
                        <div class="flex gap-2 text-xs">
                          <span class="text-slate-500">Name</span>
                          <span class="text-slate-200 font-mono text-[10px] break-all" x-text="recordDetail.ssl.cipher.name"></span>
                        </div>
                        <div class="flex gap-2 text-xs">
                          <span class="text-slate-500">Bits</span>
                          <span class="text-slate-200 font-mono" x-text="recordDetail.ssl.cipher.bits"></span>
                        </div>
                        <div class="flex gap-2 text-xs">
                          <span class="text-slate-500">Ver</span>
                          <span class="text-slate-200 font-mono" x-text="recordDetail.ssl.cipher.version"></span>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>
                <!-- TLS Versions -->
                <div class="bg-slate-800/50 rounded-lg p-3">
                  <div class="text-[10px] text-slate-500 uppercase tracking-wider mb-2">TLS Versions</div>
                  <div class="flex flex-wrap gap-1.5">
                    <template x-for="v in recordDetail.ssl.versions" :key="v">
                      <span class="tag-badge"
                        :class="v.startsWith('-') ? 'bg-red-950 text-red-500 border border-red-900 line-through opacity-60' : 'bg-green-950 text-green-400 border border-green-800'"
                        x-text="v.startsWith('-') ? v.slice(1) : v"></span>
                    </template>
                  </div>
                </div>
                <!-- Fingerprints -->
                <template x-if="recordDetail.ssl.sha256">
                  <div class="bg-slate-800/50 rounded-lg p-3">
                    <div class="text-[10px] text-slate-500 uppercase tracking-wider mb-2">Fingerprints</div>
                    <div class="space-y-1.5">
                      <div class="text-xs"><span class="text-slate-500">SHA-256 </span><span class="text-slate-300 font-mono text-[10px] break-all" x-text="recordDetail.ssl.sha256"></span></div>
                      <div class="text-xs"><span class="text-slate-500">SHA-1   </span><span class="text-slate-300 font-mono text-[10px] break-all" x-text="recordDetail.ssl.sha1"></span></div>
                    </div>
                  </div>
                </template>
                <template x-if="recordDetail.ssl.jarm">
                  <div class="bg-slate-800/50 rounded-lg p-3">
                    <div class="text-[10px] text-slate-500 uppercase tracking-wider mb-1">JARM Fingerprint</div>
                    <div class="text-[10px] text-slate-400 font-mono break-all" x-text="recordDetail.ssl.jarm"></div>
                  </div>
                </template>
              </div>
            </template>
            <template x-if="!recordDetail.ssl">
              <div class="text-center py-10 text-slate-500">No SSL/TLS data available for this host.</div>
            </template>
          </div>

          <!-- VULNS TAB -->
          <div x-show="modalTab === 'vulns'">
            <template x-if="recordDetail.vulns?.length">
              <div class="space-y-2">
                <template x-for="v in recordDetail.vulns" :key="v.cve">
                  <div class="bg-slate-800/50 border border-slate-700/50 rounded-lg p-3">
                    <div class="flex items-start gap-3">
                      <span class="tag-badge flex-shrink-0" :class="severityBg(v.cvss)" x-text="severityLabel(v.cvss)"></span>
                      <div class="flex-1 min-w-0">
                        <div class="flex items-center flex-wrap gap-2 mb-1">
                          <span class="font-bold text-slate-100 text-sm" x-text="v.cve"></span>
                          <span class="font-bold" :class="severityColor(v.cvss)" x-text="'CVSS '+v.cvss.toFixed(1)"></span>
                          <template x-if="v.cvss_v2">
                            <span class="tag-badge bg-slate-700 text-slate-400 border border-slate-600" x-text="'v2: '+v.cvss_v2"></span>
                          </template>
                          <template x-if="v.verified">
                            <span class="tag-badge bg-green-950 text-green-400 border border-green-800">✓ Verified</span>
                          </template>
                          <template x-if="v.epss">
                            <span class="tag-badge bg-slate-700 text-slate-400 border border-slate-600"
                              x-text="'EPSS '+(v.epss*100).toFixed(2)+'%'"></span>
                          </template>
                        </div>
                        <p class="text-xs text-slate-400 leading-relaxed" x-text="v.summary"></p>
                        <template x-if="v.references?.length">
                          <div class="mt-2">
                            <div class="text-[10px] text-slate-500 uppercase tracking-wider mb-1">References</div>
                            <div class="space-y-0.5">
                              <template x-for="ref in v.references.slice(0,4)" :key="ref">
                                <a :href="ref" target="_blank" rel="noopener"
                                  class="block text-[10px] text-blue-400 hover:text-blue-300 truncate font-mono"
                                  x-text="ref"></a>
                              </template>
                            </div>
                          </div>
                        </template>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </template>
            <template x-if="!recordDetail.vulns?.length">
              <div class="text-center py-10 text-slate-500">No CVEs found for this host.</div>
            </template>
          </div>

          <!-- RAW TAB -->
          <div x-show="modalTab === 'raw'">
            <template x-if="recordDetail.data">
              <pre class="bg-slate-950 border border-slate-800 rounded-lg p-4 text-[11px] text-slate-400 overflow-x-auto whitespace-pre-wrap leading-relaxed max-h-80 overflow-y-auto font-mono" x-text="recordDetail.data"></pre>
            </template>
            <template x-if="!recordDetail.data">
              <div class="text-center py-10 text-slate-500">No raw banner data available.</div>
            </template>
          </div>

        </div>
      </template>

      <!-- Modal footer -->
      <div class="px-5 py-3 border-t border-slate-800 flex justify-between items-center">
        <a :href="`https://www.shodan.io/host/${selectedRecord?.ip_str}`" target="_blank" rel="noopener"
          class="text-xs text-orange-400 hover:text-orange-300 transition flex items-center gap-1">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
          </svg>
          View on Shodan
        </a>
        <button @click="closeModal()"
          class="px-4 py-1.5 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg text-xs text-slate-300 transition">
          Close
        </button>
      </div>

    </div>
  </div>

</div><!-- /x-data -->

<script>
function shodanify() {
  return {
    view: 'overview',
    records: [],
    stats: null,
    loading: true,
    search: '',
    filters: { port: '', country: '', hasCVE: false, hasSSL: false },
    sort: { by: 'timestamp', dir: 'desc' },
    vulnSearch: '',
    vulnFilter: '',
    vulnVerifiedOnly: false,
    selectedRecord: null,
    recordDetail: null,
    modalLoading: false,
    modalTab: 'info',

    async init() {
      await Promise.all([this.fetchRecords(), this.fetchStats()]);
      this.loading = false;
    },

    async fetchRecords() {
      const res = await fetch('/api/records');
      this.records = await res.json();
    },

    async fetchStats() {
      const res = await fetch('/api/stats');
      this.stats = await res.json();
    },

    async reload() {
      this.loading = true;
      await fetch('/api/reload', { method: 'POST' });
      await Promise.all([this.fetchRecords(), this.fetchStats()]);
      this.loading = false;
    },

    async openHost(record) {
      this.selectedRecord = record;
      this.modalTab = 'info';
      this.modalLoading = true;
      const res = await fetch(`/api/records/${record.ip_str}/${record.port}`);
      this.recordDetail = await res.json();
      this.modalLoading = false;
    },

    async openHostByIp(ip, port) {
      const r = this.records.find(r => r.ip_str === ip && r.port === port);
      if (r) this.openHost(r);
    },

    closeModal() {
      this.selectedRecord = null;
      this.recordDetail = null;
    },

    get filteredRecords() {
      let r = this.records;
      if (this.search) {
        const q = this.search.toLowerCase();
        r = r.filter(h =>
          (h.ip_str || '').includes(q) ||
          (h.hostname || '').toLowerCase().includes(q) ||
          (h.org || '').toLowerCase().includes(q) ||
          (h.isp || '').toLowerCase().includes(q) ||
          (h.http_title || '').toLowerCase().includes(q) ||
          (h.country_name || '').toLowerCase().includes(q) ||
          (h.tech || []).some(t => t.toLowerCase().includes(q)) ||
          (h.asn || '').toLowerCase().includes(q)
        );
      }
      if (this.filters.port) r = r.filter(h => h.port == this.filters.port);
      if (this.filters.hasCVE) r = r.filter(h => h.vulns_count > 0);
      if (this.filters.hasSSL) r = r.filter(h => h.has_ssl);
      return [...r].sort((a, b) => {
        const av = a[this.sort.by] ?? '', bv = b[this.sort.by] ?? '';
        if (av < bv) return this.sort.dir === 'asc' ? -1 : 1;
        if (av > bv) return this.sort.dir === 'asc' ? 1 : -1;
        return 0;
      });
    },

    get filteredVulns() {
      if (!this.stats) return [];
      let v = this.stats.top_vulns;
      if (this.vulnSearch) {
        const q = this.vulnSearch.toLowerCase();
        v = v.filter(x => x.cve.toLowerCase().includes(q) || x.summary.toLowerCase().includes(q));
      }
      if (this.vulnFilter) v = v.filter(x => x.severity === this.vulnFilter);
      if (this.vulnVerifiedOnly) v = v.filter(x => x.verified);
      return v;
    },

    toggleSort(field) {
      if (this.sort.by === field) {
        this.sort.dir = this.sort.dir === 'asc' ? 'desc' : 'asc';
      } else {
        this.sort.by = field;
        this.sort.dir = 'desc';
      }
    },

    severityColor(score) {
      const s = parseFloat(score || 0);
      if (s >= 9) return 'text-red-400';
      if (s >= 7) return 'text-orange-400';
      if (s >= 4) return 'text-yellow-400';
      if (s > 0) return 'text-blue-400';
      return 'text-slate-600';
    },

    severityBg(score) {
      const s = parseFloat(score || 0);
      if (s >= 9) return 'bg-red-950 text-red-400 border border-red-800';
      if (s >= 7) return 'bg-orange-950 text-orange-400 border border-orange-800';
      if (s >= 4) return 'bg-yellow-950 text-yellow-400 border border-yellow-800';
      if (s > 0) return 'bg-blue-950 text-blue-400 border border-blue-800';
      return 'bg-slate-800 text-slate-500 border border-slate-700';
    },

    severityLabel(score) {
      const s = parseFloat(score || 0);
      if (s >= 9) return 'CRITICAL';
      if (s >= 7) return 'HIGH';
      if (s >= 4) return 'MEDIUM';
      if (s > 0) return 'LOW';
      return 'NONE';
    },

    flag(code) {
      if (!code || code === 'XX') return '🌐';
      try {
        return code.toUpperCase().split('').map(c => String.fromCodePoint(c.charCodeAt(0) + 127397)).join('');
      } catch { return '🌐'; }
    },

    formatDate(ts) {
      if (!ts) return '—';
      return new Date(ts).toLocaleString();
    },

    formatDateShort(ts) {
      if (!ts) return '—';
      return new Date(ts).toLocaleDateString();
    },
  };
}
</script>

</body>
</html>
